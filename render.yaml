services:
  - type: web
    name: boiler-generator
    runtime: python
    buildCommand: apt-get install -y fonts-dejavu-core 2>/dev/null || true && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0